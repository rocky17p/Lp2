<!DOCTYPE html>
<html>
<head>
    <title>Hospital Chatbot</title>
    <style>
        body{
            background: lightblue;
            margin: 0;
        }

        h1{
            background: blue;
            color: white;
            text-align: center;
            padding: 50px;
        }

        .content{
            padding: 20px;
        }

        .chat-icon{
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: blue;
            color: white;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
        }

        .chat-box{
            display: none;
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 250px;
            max-height: 400px;
            overflow-y: auto;
            background: white;
            border: 1px solid black;
            padding: 10px;
        }

        input{
            width: 70%;
        }
    </style>
</head>

<body>

    <h1>City Hospital</h1>

    <div class="content">
        <h3>About Us</h3>
        <p>Healthcare services available.</p>
    </div>

    <!-- Chat Button -->
    <div class="chat-icon" onclick="openChat()">
        chat
    </div>

    <!-- Chat Box -->
    <div class="chat-box" id="chatWindow">

        <h3>
            Chatbot
            <span style="float:right;cursor:pointer;"
            onclick="closeChat()">X</span>
        </h3>

        <div id="chatBody">
            <p>
                <b>Bot:</b> Hello User! I can help you with
                Doctor, Appointment, Emergency, Timing,
                Location and Fees.
            </p>
        </div>

        <input type="text" id="userInput">
        <button onclick="sendMessage()">Send</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
