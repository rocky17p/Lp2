<!DOCTYPE html>
<html>
<head>
    <title>City Hospital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>City Hospital</h1>
        <p>Welcome to City Hospital Website</p>
    </header>

    <section class="content">
        <h2>About Us</h2>
        <p>We provide the best healthcare services.</p>
    </section>

    <!-- Chat Button -->
    <div class="chat-icon" onclick="openChat()">💬</div>

    <!-- Chat Window -->
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            Hospital Chatbot
            <span onclick="closeChat()">✖</span>
        </div>

        <div class="chat-body" id="chatBody">
            <p><b>Bot:</b> I can help with Doctor, Appointment, Emergency, Timing, Location, Fees and Address. </p>
        </div>

        <div class="chat-footer">
            <input type="text" id="userInput" placeholder="Ask here...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
